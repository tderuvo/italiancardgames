<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🃏</text></svg>" />
    <title>Italian Card Games</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <!-- Hidden form so Netlify detects it at build time (required for React SPAs) -->
    <form name="contact" data-netlify="true" hidden aria-hidden="true">
      <input type="hidden" name="form-name" value="contact" />
      <input type="text"  name="name"    aria-label="Name" />
      <input type="email" name="email"   aria-label="Email" />
      <textarea           name="message" aria-label="Message"></textarea>
    </form>
  </body>
</html>
